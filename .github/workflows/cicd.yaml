name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
      - feat/env
  pull_request:
    branches:
      - main
      - develop
      - feat/env

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/front
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
            -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        server:
          - host: "3.36.57.151" 
            name: "front"
          - host: "3.36.112.194"
            name: "front"
          - host: "13.124.239.162"
            name: "front"
          - host: "3.38.247.224"
            name: "front"  
          - host: "43.201.37.211"
            name: "front"
      fail-fast: false  # 한 서버 실패해도 다른 서버는 계속 배포
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ matrix.server.host }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 (${{ matrix.server.name }})
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ matrix.server.host }} 'bash -s' <<EOF
          set -e

          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN=${{ secrets.DOCKER_TOKEN }}
          IMAGE_NAME=\$DOCKER_USERNAME/front:latest

          echo ">>> Docker Hub login"
          echo "\$DOCKER_TOKEN" | docker login -u "\$DOCKER_USERNAME" --password-stdin

          echo ">>> Pull latest image: \$IMAGE_NAME"
          docker pull "\$IMAGE_NAME"

          echo ">>> Move to app directory"
          mkdir -p /home/${{ secrets.SERVER_USER }}/app
          cd /home/${{ secrets.SERVER_USER }}/app

          echo ">>> docker compose down (if exists)"
          docker compose down || true

          echo ">>> docker compose up -d"
          docker compose up -d

          echo ">>> Deployed to ${{ matrix.server.name }}!"
          EOF
