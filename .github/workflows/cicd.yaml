name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
      - feat/env
  pull_request:
    branches:
      - main
      - develop
      - feat/env

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/front
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_SOCKET_URL=${{ secrets.NEXT_PUBLIC_SOCKET_URL }} \
            -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EC2 instance IPs
        id: get-instances
        run: |
          INSTANCE_IPS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Role,Values=frontend" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[*].Instances[*].PublicIpAddress' \
            --output json | jq -r '.[] | .[]' | tr '\n' ' ')

          if [ -z "$INSTANCE_IPS" ]; then
            echo "No EC2 instances found."
            exit 1
          fi

          echo "INSTANCE_IPS=$INSTANCE_IPS" >> $GITHUB_OUTPUT
          echo "Found IPs: $INSTANCE_IPS"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy to EC2 instances
        env:
          INSTANCE_IPS: ${{ steps.get-instances.outputs.INSTANCE_IPS }}
        run: |
          for IP in $INSTANCE_IPS; do
            echo ">>> Deploying to $IP"

            # Add to known_hosts
            ssh-keyscan -H $IP >> ~/.ssh/known_hosts

            # Deploy
            ssh ${{ secrets.SERVER_USER }}@$IP 'bash -s' <<EOF
          set -e

          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN=${{ secrets.DOCKER_TOKEN }}
          IMAGE_NAME=\$DOCKER_USERNAME/front:latest

          echo ">>> Docker Hub login"
          echo "\$DOCKER_TOKEN" | docker login -u "\$DOCKER_USERNAME" --password-stdin

          echo ">>> Pull latest image: \$IMAGE_NAME"
          docker pull "\$IMAGE_NAME"

          echo ">>> Move to app directory"
          mkdir -p /home/${{ secrets.SERVER_USER }}/app
          cd /home/${{ secrets.SERVER_USER }}/app

          echo ">>> docker compose down (if exists)"
          docker compose down || true

          echo ">>> docker compose up -d"
          docker compose up -d

          echo ">>> Deployed successfully!"
          EOF

            echo ">>> Deployment to $IP completed"
          done
