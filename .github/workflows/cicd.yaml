name: Docker Build and Push

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/community-front
  IMAGE_TAG: latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Image
        run: |
          docker build -t $IMAGE_NAME:$IMAGE_TAG .
          docker push $IMAGE_NAME:$IMAGE_TAG

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} 'bash -s' <<EOF
          set -e

          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN=${{ secrets.DOCKER_TOKEN }}
          IMAGE_NAME=\$DOCKER_USERNAME/community-front:latest

          echo ">>> Docker Hub login"
          echo "\$DOCKER_TOKEN" | docker login -u "\$DOCKER_USERNAME" --password-stdin

          echo ">>> Pull latest image: \$IMAGE_NAME"
          docker pull "\$IMAGE_NAME"

          echo ">>> Move to app directory"
          mkdir -p /home/${{ secrets.SERVER_USER }}/front
          cd /home/${{ secrets.SERVER_USER }}/front

          echo ">>> docker compose down (if exists)"
          docker compose down || true

          echo ">>> docker compose up -d"
          docker compose up -d

          echo ">>> Deployed!"
          EOF
